services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-warehouse
      DB_PORT: 5432
      DB_DATABASE: warehouse_db
      DB_USERNAME: admin
      DB_PASSWORD: password123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www
    depends_on:
      - postgres-warehouse
      - redis
    networks:
      - warehouse-net

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - warehouse-net

  postgres-warehouse:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5434:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d warehouse_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warehouse-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - warehouse-net

networks:
  warehouse-net:
    driver: bridge

volumes:
  pgsql-data: