"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Query {
    "Query kosong wajib ada agar GraphQL tidak error"
    ping: String! @field(resolver: "App\\Http\\Controllers\\Api\\AssignmentController@ping")
}

type Mutation {
    "Mutation untuk mensimulasikan orderan masuk dan otomatis menunjuk driver"
    simulateAssignment(order_id: String!): AssignmentResponse! 
        @field(resolver: "App\\Http\\Controllers\\Api\\AssignmentController@storeGraphQL")
}

type AssignmentResponse {
    status: String!
    message: String!
    data: AssignmentData
}

type AssignmentData {
    assignment_id: Int!
    order_id: String!
    assigned_driver: DriverInfo
}

type DriverInfo {
    id: Int!
    name: String!
    phone_number: String!
}